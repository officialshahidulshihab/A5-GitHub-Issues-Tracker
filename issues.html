<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>

    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">

    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="./style.css">

</head>

<body>

    <section>
        
        
        <dialog id="issue-modal" class="modal">
            <div id="modal-container" class="modal-box">
               
                
            </div>
        </dialog>
    </section>

    <header>
        <div class="navbar bg-base-100 shadow-sm justify-between">
            <div class="flex gap-2 items-center">
                <div class="w-9"><img src="./assets/github-logo.png" alt="">
                </div>
                <p class="text-[24px] font-semibold">GitHub Issues Tracker</p>

            </div>
            <div class="flex gap-2">
                <div>
                    <label class="input">
                        <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                            <g stroke-linejoin="round" stroke-linecap="round" stroke-width="2.5" fill="none"
                                stroke="currentColor">
                                <circle cx="11" cy="11" r="8"></circle>
                                <path d="m21 21-4.3-4.3"></path>
                            </g>
                        </svg>
                        <input type="search" required placeholder="Search issues..." />
                    </label>
                </div>

                <button class="btn btn-primary"><i class="fa-solid fa-plus"></i>New Issue</button>
            </div>
        </div>
    </header>

    <section class="w-11/12 mx-auto mt-10 ">

        <div class="bg-base-100 shadow-sm p-5">
            <button onclick="tapBtn('allBtn')" id="allBtn" class="btn btn-primary w-[120px]">All</button>
            <button id="openBtn" class="btn  w-[120px]">Open</button>
            <button onclick="tapBtn('closeBtn')" id="closeBtn" class="btn  w-[120px]">Closed</button>

        </div>

    </section>

    <section class="w-11/12 mx-auto mt-5 bg-base-100 shadow-sm p-7">
        <div class="flex justify-between items-center">
            <div class="flex gap-2 items-center">
                <div class="bg-[#ECE4FF] w-[50px] h-[50px] flex items-center justify-center rounded-full">
                    <div>
                        <img src="./assets/Aperture.png" alt="" class="">
                    </div>

                </div>

                <div>
                    <p id="issues-counter-container" class="text-[20px] font-semibold"></p>
                    <p class="text-[#64748B]">Track and manage your project issues</p>
                </div>

            </div>

            <div class="space-x-2">
                <span><i class="fa-solid fa-circle text-[#00A96E]"></i> Open</span>
                <span><i class="fa-solid fa-circle text-[#A855F7]"></i> Closed</span>
            </div>
        </div>



    </section>




    <section id="spiner-container" class="flex justify-center items-center py-20 hidden">
        <span class="loading loading-bars loading-xl"></span>
    </section>

    <section id="issues-container" class="w-11/12 mx-auto  bg-base-100 shadow-sm p-3 grid grid-cols-4 gap-3">
