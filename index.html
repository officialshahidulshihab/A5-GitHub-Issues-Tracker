<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Home | GitHub Issues Tracker</title>
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">

    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="./style.css">


</head>

<body class="">

    
    <section id="login-sec" class="w-11/12  md:w-4/12 mx-auto  ">
        <div class=" mt-20 mb-20 ">

            <div class="bg-base-100  shadow-sm p-10 rounded-lg">
                <img src="./assets/github-logo.png" alt="" class="mx-auto">
                <p class="font-semibold text-[24px] mt-4 text-center">GitHub Issues Tracker</p>
                <p class="text-[#64748B] mb-5 text-center">Sign in to manage your issues</p>

                <div>
                    <fieldset class="fieldset">
                        <legend class="fieldset-legend font-medium ">Username</legend>
                        <input id="user-name" type="text" class="input w-full rounded-lg"
                            placeholder="Enter Username" />
                        <p class="label text-[#4A00FF]">Default: admin</p>
                    </fieldset>

                    <fieldset class="fieldset">
                        <legend class="fieldset-legend font-medium ">Password</legend>
                        <input id="user-password" type="password" class="input w-full rounded-lg"
                            placeholder="Enter Password" />
                        <p class="label text-[#4A00FF]">Default: admin123</p>
                    </fieldset>


                </div>

                <button id="sing-in-btn" class="btn btn-primary w-full mt-5">Sign In</button>

                <div class="flex mt-6 items-center ">
                    <div class="grow border-t  border-[#E4E4E7]"></div>
                    <span class="mx-4">OR</span>
                    <div class="grow border-t  border-[#E4E4E7]"></div>

                </div>

                <div class="mt-5">
                    <p class="text-[#64748B] text-center">Demo Credentials:</p>
                    <p class="mt-3 bg-base-200 p-5 text-center">
                        Username: admin <br>

                        Password: admin123
                    </p>
                </div>
            </div>

        </div>


    </section>









    
    <script src="./scripts/index.js"></script>
</body>

</html>
